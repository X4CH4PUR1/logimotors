document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    const mobileNavStyle = '<style>@media(max-width:850px){header>div{height:64px!important;padding:0 16px!important;gap:12px!important}header>div>a>span:first-child{font-size:21px!important}header>div>nav{display:none!important}.logi-mobile-menu{display:block;border:1px solid var(--line);border-radius:8px;background:transparent;color:var(--text);padding:9px 11px;cursor:pointer;font:700 11px/1 ui-monospace,monospace;letter-spacing:1.2px}.logi-mobile-menu[aria-expanded=true]{border-color:var(--acc);color:var(--acc)}.logi-mobile-panel{position:fixed;top:67px;left:0;right:0;z-index:59;display:none;grid-template-columns:repeat(2,minmax(0,1fr));gap:4px;padding:12px 16px 16px;background:var(--bg2);border-bottom:1px solid var(--line);box-shadow:0 14px 30px var(--shadow)}.logi-mobile-panel.open{display:grid}.logi-mobile-panel a{padding:12px 10px!important;border:1px solid var(--line)!important;border-radius:6px;font-size:14px!important}.logi-mobile-controls{gap:4px!important}.logi-mobile-controls>button{display:none!important}.logi-mobile-controls>div{padding:2px!important}.logi-mobile-controls button{padding:5px 6px!important;font-size:10px!important}}@media(max-width:380px){header>div{padding:0 10px!important;gap:7px!important}.logi-mobile-panel{grid-template-columns:1fr;padding-left:10px;padding-right:10px}}</style>';
    const mobileNavBaseStyle = '<style>.logi-mobile-menu,.logi-mobile-panel{display:none}</style>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + mobileNavBaseStyle + mobileNavStyle + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
    const header = document.querySelector('header');
    const mountMobileNav = function() {
      if (!header || header.querySelector('.logi-mobile-menu')) return !!header;
      const inner = header.querySelector(':scope > div');
      const nav = inner && inner.querySelector(':scope > nav');
      const controls = nav && nav.nextElementSibling;
      if (inner && nav && controls && nav.querySelector('a')) {
        controls.classList.add('logi-mobile-controls');
        const menu = document.createElement('button');
        menu.type = 'button'; menu.className = 'logi-mobile-menu'; menu.textContent = 'MENU';
        menu.setAttribute('aria-expanded', 'false');
        const panel = nav.cloneNode(true);
        panel.className = 'logi-mobile-panel';
        panel.setAttribute('aria-label', 'Mobile navigation');
        header.appendChild(panel); inner.appendChild(menu);
        menu.addEventListener('click', function() {
          const open = panel.classList.toggle('open');
          menu.setAttribute('aria-expanded', String(open));
        });
        panel.addEventListener('click', function(e) {
          if (e.target.closest('a')) { panel.classList.remove('open'); menu.setAttribute('aria-expanded', 'false'); }
        });
        return true;
      }
      return false;
    };
    if (!mountMobileNav() && header) {
      const observer = new MutationObserver(function() {
        if (mountMobileNav()) observer.disconnect();
      });
      observer.observe(header, { childList: true, subtree: true });
      setTimeout(function() { observer.disconnect(); }, 5000);
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"nw\" hint-placeholder-count=\"2\">\n              <a href=\"#/news\" style=\"text-decoration:none;color:var(--text);border:1px solid var(--line);background:var(--card);padding:26px 26px 28px 26px;clip-path:polygon(0 0,calc(100% - 20px) 0,100% 20px,100% 100%,0 100%);display:block;transition:border-color .25s,transform .25s,box-shadow .25s\" style-hover=\"border-color:var(--acc);transform:translateY(-4px);box-shadow:0 18px 44px var(--shadow),0 0 26px var(--glow);color:var(--text)\">\n                <div style=\"font-family:ui-monospace,monospace;font-size:12px;letter-spacing:2px;color:var(--acc);margin-bottom:12px\">{{ nw.date }}<\u002Fdiv>\n                <div style=\"font-weight:700;font-size:18px;line-height:1.4;margin-bottom:10px;text-wrap:balance\">{{ nw.title }}<\u002Fdiv>\n                <div style=\"color:var(--mut);font-size:14px;line-height:1.6\">{{ nw.excerpt }}<\u002Fdiv>\n              <\u002Fa>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- CTA BAND -->\n        <section style=\"position:relative;background:linear-gradient(90deg,#f5a800,#f07818);color:#16181f\">\n          <span style=\"position:absolute;top:0;left:0;right:0;height:10px;background:repeating-linear-gradient(-45deg,#16181f 0 14px,transparent 14px 28px)\"><\u002Fspan>\n          <span style=\"position:absolute;bottom:0;left:0;right:0;height:10px;background:repeating-linear-gradient(-45deg,#16181f 0 14px,transparent 14px 28px)\"><\u002Fspan>\n          <div style=\"max-width:1280px;margin:0 auto;padding:72px 28px;display:flex;align-items:center;justify-content:space-between;gap:28px;flex-wrap:wrap\">\n            <div>\n              <div style=\"font-family:'Unbounded','Noto Sans Georgian',sans-serif;font-weight:900;font-size:clamp(26px,3vw,40px);letter-spacing:-.5px;margin-bottom:8px\">{{ t.ctaTitle }}<\u002Fdiv>\n              <div style=\"font-size:17px;font-weight:500;opacity:.85\">{{ t.ctaSub }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:6px;align-items:flex-end\">\n              <a href=\"tel:+995599585148\" style=\"text-decoration:none;color:#16181f;font-family:'Unbounded','Noto Sans Georgian',sans-serif;font-weight:800;font-size:clamp(22px,2.4vw,32px)\" style-hover=\"color:#16181f\">(599) 585 148<\u002Fa>\n              <a href=\"tel:+995555502502\" style=\"text-decoration:none;color:#16181f;font-family:'Unbounded','Noto Sans Georgian',sans-serif;font-weight:800;font-size:clamp(22px,2.4vw,32px)\" style-hover=\"color:#16181f\">(555) 502 502<\u002Fa>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Fdiv><\u002Fmain>\n\n  <!-- ============ FOOTER ============ -->\n  <footer style=\"position:relative;overflow:hidden;border-top:1px solid var(--line);background:var(--bg2);margin-top:0\">\n    <span style=\"display:block;height:6px;background:repeating-linear-gradient(-45deg,#f5a800 0 12px,#16181f 12px 24px)\"><\u002Fspan>\n    <div style=\"position:absolute;right:-14px;bottom:-40px;font-family:'Unbounded','Noto Sans Georgian',sans-serif;font-weight:900;font-size:210px;line-height:1;letter-spacing:6px;color:transparent;-webkit-text-stroke:1px var(--line);opacity:.55;pointer-events:none;user-select:none\">LOGI<\u002Fdiv>\n    <div style=\"position:relative;max-width:1280px;margin:0 auto;padding:56px 28px 28px 28px\">\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:40px;padding-bottom:44px;border-bottom:1px solid var(--line)\">\n        <div>\n          <div style=\"display:inline-flex;flex-direction:column;gap:3px;margin-bottom:16px\">\n            <span style=\"font-family:'Unbounded','Noto Sans Georgian',sans-serif;font-weight:900;font-size:30px;letter-spacing:1px;line-height:1\">LOGI<\u002Fspan>\n            <span style=\"display:block;height:4px;background:repeating-linear-gradient(-45deg,#f5a800 0 7px,#f07818 7px 14px)\"><\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"color:var(--mut);font-size:14px;line-height:1.7;max-width:280px\">{{ fLegal }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:14px\">\n          <span style=\"font-family:ui-monospace,monospace;font-size:11px;letter-spacing:2.5px;color:var(--acc)\">// MENU<\u002Fspan>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px 24px;max-width:300px\">\n            <sc-for list=\"{{ navItems }}\" as=\"ni\" hint-placeholder-count=\"7\">\n              <a href=\"{{ ni.href }}\" style=\"text-decoration:none;color:var(--mut);font-size:14px;transition:color .2s\" style-hover=\"color:var(--acc)\">{{ ni.label }}<\u002Fa>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px;color:var(--mut);font-size:14px;line-height:1.6\">\n          <span style=\"font-family:ui-monospace,monospace;font-size:11px;letter-spacing:2.5px;color:var(--acc)\">// CONTACT<\u002Fspan>\n          <span>{{ fAddress }}<\u002Fspan>\n          <span>{{ fPhones }}<\u002Fspan>\n          <a href=\"mailto:logi@logimotors.com\" style=\"color:var(--acc);text-decoration:none\">{{ fEmail }}<\u002Fa>\n          <span>{{ fHours }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;padding-top:22px;font-family:ui-monospace,monospace;font-size:11px;letter-spacing:1.5px;color:var(--mut)\">\n        <span>© 2026 LOGIMOTORS LTD · ID {{ fId }}<\u002Fspan>\n        <a href=\"#/admin\" style=\"color:var(--mut);text-decoration:none\" style-hover=\"color:var(--acc)\">ADMIN<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;defaultLang&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;en&quot;, &quot;ka&quot;, &quot;ru&quot;], &quot;default&quot;: &quot;en&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Defaults&quot; },\n  &quot;defaultTheme&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;night&quot;, &quot;day&quot;], &quot;default&quot;: &quot;night&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Defaults&quot; }\n}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    const lang = localStorage.getItem('logi_lang') || props.defaultLang || 'en';\n    const theme = localStorage.getItem('logi_theme') || props.defaultTheme || 'night';\n    this.state = {\n      ready: false, route: this._hash(), lang, night: theme !== 'day',\n      fMode: 'all', fFuel: 'all', selId: null,\n      cform: {}, sent: false,\n      adminOk: sessionStorage.getItem('logi_admin') === '1', pin: '', pinErr: false,\n      aTab: 'products', editLang: 'en',\n      pfOpen: false, pf: null, nfOpen: false, nf: null,\n      statsProg: 1\n    };\n    this.heroR = React.createRef();\n    this.orbA = React.createRef();\n    this.orbB = React.createRef();\n    this.ringWrap = React.createRef();\n    this.D = null;\n    this.content = null;\n  }\n\n  _hash() { const h = (location.hash || '').replace(/^#\\/?/, ''); return h || 'home'; }\n\n  componentDidMount() {\n    this._onHash = () => { this.setState({ route: this._hash() }); window.scrollTo(0, 0); this._runStats(); };\n    window.addEventListener('hashchange', this._onHash);\n    this._applyTheme();\n    const waitGlobal = () => new Promise((res, rej) => {\n      let n = 0;\n      const t = setInterval(() => {\n        if (window.LOGI_DATA) { clearInterval(t); res(window.LOGI_DATA); }\n        else if (++n > 60) { clearInterval(t); rej(new Error('no LOGI_DATA')); }\n      }, 25);\n    });\n    const loadData = import('./logi-data.js').catch(() => waitGlobal());\n    loadData.then((m) => {\n      this.D = m;\n      let saved = {};\n      try { saved = JSON.parse(localStorage.getItem('logi_content_v1') || '{}') || {}; } catch (e) { saved = {}; }\n      this.content = {\n        texts: Object.assign({}, m.DEFAULT_CONTENT.texts, saved.texts || {}),\n        products: saved.products || m.DEFAULT_CONTENT.products,\n        news: saved.news || m.DEFAULT_CONTENT.news,\n        gallery: saved.gallery || m.DEFAULT_CONTENT.gallery,\n        contacts: Object.assign({}, m.DEFAULT_CONTENT.contacts, saved.contacts || {}),\n        strings: saved.strings || {},\n        servicesOv: saved.servicesOv || {},\n        brandsOv: saved.brandsOv || ''\n      };\n      this.setState({ ready: true }, () => this._runStats());\n    });\n    this._initCursor();\n  }\n\n  _initCursor() {\n    if (!(window.matchMedia && window.matchMedia('(pointer:fine)').matches)) return;\n    const d = document.createElement('div');\n    d.style.cssText = 'position:fixed;left:0;top:0;width:340px;height:340px;border-radius:50%;pointer-events:none;z-index:0;transform:translate(-1000px,-1000px);background:radial-gradient(circle,var(--glow) 0%,transparent 65%);opacity:0;transition:opacity .4s';\n    document.body.appendChild(d);\n    this._cGlow = d;\n    let tx = -1000, ty = -1000, rx = -1000, ry = -1000;\n    this._cMove = (e) => { tx = e.clientX; ty = e.clientY; d.style.opacity = '1'; };\n    this._cOut = () => { d.style.opacity = '0'; };\n    document.addEventListener('mousemove', this._cMove, { passive: true });\n    document.documentElement.addEventListener('mouseleave', this._cOut);\n    const loop = () => {\n      rx += (tx - rx) * 0.12; ry += (ty - ry) * 0.12;\n      d.style.transform = 'translate(' + (rx - 170) + 'px,' + (ry - 170) + 'px)';\n      this._cRaf = requestAnimationFrame(loop);\n    };\n    loop();\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('hashchange', this._onHash);\n    cancelAnimationFrame(this._raf);\n    cancelAnimationFrame(this._cRaf);\n    if (this._cMove) document.removeEventListener('mousemove', this._cMove);\n    if (this._cOut) document.documentElement.removeEventListener('mouseleave', this._cOut);\n    if (this._cGlow) this._cGlow.remove();\n  }\n\n  componentDidUpdate() { this._applyTheme(); }\n\n  _applyTheme() {\n    if (this.state.night) document.body.removeAttribute('data-day');\n    else document.body.setAttribute('data-day', '1');\n  }\n\n  _runStats() {\n    if (this._hash() !== 'home') return;\n    cancelAnimationFrame(this._raf);\n    const t0 = performance.now();\n    const tick = (t) => {\n      const p = Math.min(1, (t - t0) / 1400);\n      this.setState({ statsProg: p });\n      if (p < 1) this._raf = requestAnimationFrame(tick);\n    };\n    this._raf = requestAnimationFrame(tick);\n  }\n\n  _save() { localStorage.setItem('logi_content_v1', JSON.stringify(this.content)); this.forceUpdate(); }\n\n  _fmt(n) { return Number(n || 0).toLocaleString('en-US').replace(/,/g, ' '); }\n\n  _resize(file, cb) {\n    const rd = new FileReader();\n    rd.onload = () => {\n      const img = new Image();\n      img.onload = () => {\n        const M = 1200;\n        const sc = Math.min(1, M / Math.max(img.width, img.height));\n        const w = Math.round(img.width * sc), h = Math.round(img.height * sc);\n        const cv = document.createElement('canvas');\n        cv.width = w; cv.height = h;\n        cv.getContext('2d').drawImage(img, 0, 0, w, h);\n        cb(cv.toDataURL('image/jpeg', 0.82));\n      };\n      img.src = rd.result;\n    };\n    rd.readAsDataURL(file);\n  }\n\n  _mapProd(p, t, lang) {\n    const badges = [];\n    if (p.mode) badges.push(p.mode === 'sale' ? t.modeSale : t.modeRent);\n    if (p.fuel) badges.push(p.fuel === 'electric' ? t.fuelElectric : p.fuel === 'diesel' ? t.fuelDiesel : t.fuelGasoline);\n    if (p.cond) badges.push(p.cond === 'new' ? t.condNew : t.condUsed);\n    const specs = [];\n    if (p.brand) specs.push({ k: t.brand, v: p.brand });\n    if (p.capacity) specs.push({ k: t.capacity, v: p.capacity });\n    if (p.lift) specs.push({ k: t.lift, v: p.lift });\n    if (p.year) specs.push({ k: t.year, v: p.year });\n    return {\n      id: p.id, title: (p.name && (p.name[lang] || p.name.en)) || '', brand: (p.brand || '').toUpperCase(),\n      badges, specs, img: p.img || '', hasImg: !!p.img, noImg: !p.img,\n      price: '€ ' + this._fmt(p.price) + (p.unit === 'mo' ? ' ' + t.perMonth : '')\n    };\n  }\n\n  renderVals() {\n    const s = this.state;\n    const base = {\n      ready: s.ready, heroR: this.heroR, orbA: this.orbA, orbB: this.orbB, ringWrap: this.ringWrap,\n      themeLabel: s.night ? 'DAY' : 'NIGHT',\n      toggleTheme: () => { const night = !s.night; localStorage.setItem('logi_theme', night ? 'night' : 'day'); this.setState({ night }); },\n      setLang: (e) => { const lang = e.currentTarget.dataset.lang; localStorage.setItem('logi_lang', lang); this.setState({ lang }); },\n      heroMove: (e) => {\n        const r = this.heroR.current; if (!r) return;\n        const b = r.getBoundingClientRect();\n        const x = (e.clientX - b.left) / b.width - 0.5, y = (e.clientY - b.top) / b.height - 0.5;\n        if (this.orbA.current) this.orbA.current.style.transform = 'translate(' + (x * 46) + 'px,' + (y * 34) + 'px)';\n        if (this.orbB.current) this.orbB.current.style.transform = 'translate(' + (x * -30) + 'px,' + (y * -22) + 'px)';\n        if (this.ringWrap.current) this.ringWrap.current.style.transform = 'perspective(900px) rotateY(' + (x * 14) + 'deg) rotateX(' + (-y * 10) + 'deg)';\n      },\n      tilt: (e) => {\n        const el = e.currentTarget; const b = el.getBoundingClientRect();\n        const x = (e.clientX - b.left) / b.width - 0.5, y = (e.clientY - b.top) / b.height - 0.5;\n        el.style.transform = 'perspective(700px) rotateY(' + (x * 7) + 'deg) rotateX(' + (-y * 7) + 'deg) translateY(-4px)';\n      },\n      untilt: (e) => { e.currentTarget.style.transform = ''; },\n      stopClick: (e) => e.stopPropagation()\n    };\n    if (!s.ready || !this.D) return
